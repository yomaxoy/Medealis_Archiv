# =============================================================================
# Medealis Warehouse Management System - Docker Compose
# =============================================================================
# Startet PostgreSQL + beide Streamlit-Apps (Admin + User)
# MIGRIERT: PostgreSQL statt SQLite
# =============================================================================

version: '3.8'

services:
  # PostgreSQL Database (NEU)
  postgres:
    image: postgres:15-alpine
    container_name: medealis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medealis}
      POSTGRES_USER: ${POSTGRES_USER:-medealis_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=de_DE.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medealis_user} -d ${POSTGRES_DB:-medealis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medealis-network

  # Admin-App (Port 8501)
  medealis-admin:
    build: .
    container_name: medealis_admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      # Template-Verzeichnis (read-only)
      - ./resources/templates:/app/resources/templates:ro
      # User-Daten-Verzeichnis (Dokumente, Wareneingang)
      - ${USER_DATA_DIR:-./user_data}:/root/Medealis/Wareneingang
      # Logs
      - ./data/logs:/app/data/logs
    environment:
      # PostgreSQL Connection (NEU)
      - DATABASE_URL=postgresql://${POSTGRES_USER:-medealis_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medealis}
      # SharePoint Storage (statt Server-Storage)
      - USE_SERVER_STORAGE=false
      - USE_SHAREPOINT=${USE_SHAREPOINT:-false}
      # SharePoint Credentials
      - SHAREPOINT_SITE_URL=${SHAREPOINT_SITE_URL}
      - SHAREPOINT_CLIENT_ID=${SHAREPOINT_CLIENT_ID}
      - SHAREPOINT_CLIENT_SECRET=${SHAREPOINT_CLIENT_SECRET}
      - SHAREPOINT_TENANT_ID=${SHAREPOINT_TENANT_ID}
      # AI API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Umgebung
      - ENVIRONMENT=production
      - DEBUG=false
    env_file:
      - .env
    command: streamlit run src/warehouse/presentation/admin/main_admin_app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - medealis-network

  # User-App (Port 8502)
  medealis-user:
    build: .
    container_name: medealis_user
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8502:8502"
    volumes:
      # Template-Verzeichnis (read-only)
      - ./resources/templates:/app/resources/templates:ro
      # User-Daten-Verzeichnis (Dokumente, Wareneingang)
      - ${USER_DATA_DIR:-./user_data}:/root/Medealis/Wareneingang
      # Logs
      - ./data/logs:/app/data/logs
    environment:
      # PostgreSQL Connection (NEU) - gleiche DB wie Admin
      - DATABASE_URL=postgresql://${POSTGRES_USER:-medealis_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medealis}
      # SharePoint Storage
      - USE_SERVER_STORAGE=false
      - USE_SHAREPOINT=${USE_SHAREPOINT:-false}
      - SHAREPOINT_SITE_URL=${SHAREPOINT_SITE_URL}
      - SHAREPOINT_CLIENT_ID=${SHAREPOINT_CLIENT_ID}
      - SHAREPOINT_CLIENT_SECRET=${SHAREPOINT_CLIENT_SECRET}
      - SHAREPOINT_TENANT_ID=${SHAREPOINT_TENANT_ID}
      # AI API Keys
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Umgebung
      - ENVIRONMENT=production
      - DEBUG=false
    env_file:
      - .env
    command: streamlit run src/warehouse/presentation/user/main_user_app.py --server.port=8502 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - medealis-network

networks:
  medealis-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: C:/Users/kkrue/.medealis/postgres_data
